      },
      get: key => {
        const itemStr = localStorage.getItem(key)

        const { value, expiry } = JSON.parse(itemStr)
        if (Date.now() > expiry) {
          localStorage.removeItem(key)
          return undefined
        }
        return value
      }
    }

        }
